name: Theme contracts

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
      - name: PHP syntax
        run: find . -type f -name '*.php' -not -path './dist/*' -print0 | xargs -0 -n1 php -l
      - name: Contract tests
        run: for test in tests/*-test.php; do php "$test"; done
